<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Đơn hàng của tôi - MiniShop</title>
</head>
<body>
<div layout:fragment="content">

    <h3 class="mb-4"><i class="bi bi-receipt"></i> Đơn hàng của tôi</h3>

    <!-- Không có đơn hàng -->
    <div th:if="${#lists.size(orders) == 0}" class="text-center py-5">
        <i class="bi bi-inbox display-1 text-muted"></i>
        <p class="text-muted mt-3 fs-5">Bạn chưa có đơn hàng nào.</p>
        <a th:href="@{/}" class="btn btn-primary">
            <i class="bi bi-arrow-left"></i> Tiếp tục mua sắm
        </a>
    </div>

    <!-- Danh sách đơn hàng -->
    <div th:if="${#lists.size(orders) > 0}" class="table-responsive">
        <table class="table table-hover bg-white shadow-sm" style="border-radius: 12px; overflow: hidden;">
            <thead class="table-dark">
                <tr>
                    <th>Mã đơn</th>
                    <th>Ngày đặt</th>
                    <th class="text-end">Tổng tiền</th>
                    <th class="text-center">Trạng thái</th>
                    <th class="text-center">Chi tiết</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td>#<span th:text="${order.id}">1</span></td>
                    <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2026</td>
                    <td class="text-end fw-bold text-danger text-nowrap"
                        th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
                    <td class="text-center">
                        <span class="badge"
                              th:classappend="${order.status == 'PENDING' ? 'bg-warning text-dark' :
                                               (order.status == 'COMPLETED' ? 'bg-success' : 'bg-secondary')}"
                              th:text="${order.status}">PENDING</span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-eye"></i> Xem
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
