<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini E-Commerce</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
        }
        .navbar-brand i {
            color: #ffc107;
        }
        main {
            flex: 1;
        }
        footer {
            background-color: #343a40;
            color: #adb5bd;
            padding: 20px 0;
            margin-top: auto;
        }
    </style>
</head>
<body>

<!-- ==================== HEADER / NAVBAR ==================== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-shop"></i> MiniShop
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">

                <!-- Nếu CHƯA đăng nhập -->
                <th:block th:if="${session.loggedInUser == null}">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/login}">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/register}">
                            <i class="bi bi-person-plus"></i> Đăng ký
                        </a>
                    </li>
                </th:block>

                <!-- Nếu ĐÃ đăng nhập -->
                <th:block th:if="${session.loggedInUser != null}">
                    <li class="nav-item">
                        <span class="nav-link text-warning">
                            <i class="bi bi-person-circle"></i>
                            Xin chào, <strong th:text="${session.loggedInUser.fullname}">User</strong>
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link position-relative" th:href="@{/cart}">
                            <i class="bi bi-cart3 fs-5"></i> Giỏ hàng
                            <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle"
                                  th:if="${cartCount != null && cartCount > 0}"
                                  th:text="${cartCount}">0</span>
                        </a>
                    </li>
                    <li class="nav-item ms-2">
                        <a class="btn btn-outline-light btn-sm" th:href="@{/logout}">
                            <i class="bi bi-box-arrow-right"></i> Đăng xuất
                        </a>
                    </li>
                </th:block>

                <!-- Giỏ hàng cho khách (chưa đăng nhập) -->
                <th:block th:if="${session.loggedInUser == null}">
                    <li class="nav-item">
                        <a class="nav-link position-relative" th:href="@{/cart}">
                            <i class="bi bi-cart3 fs-5"></i> Giỏ hàng
                            <span class="badge bg-danger rounded-pill position-absolute top-0 start-100 translate-middle"
                                  th:if="${cartCount != null && cartCount > 0}"
                                  th:text="${cartCount}">0</span>
                        </a>
                    </li>
                </th:block>
            </ul>
        </div>
    </div>
</nav>

<!-- ==================== MAIN CONTENT ==================== -->
<main class="container py-4">
    <!-- Flash messages -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div layout:fragment="content"></div>
</main>

<!-- ==================== FOOTER ==================== -->
<footer class="text-center">
    <div class="container">
        <p class="mb-0">&copy; 2026 MiniShop - Mini E-Commerce App</p>
    </div>
</footer>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
