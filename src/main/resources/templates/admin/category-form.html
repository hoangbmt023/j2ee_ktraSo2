<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${category.id != null ? 'Sửa danh mục' : 'Thêm danh mục'} + ' - MiniShop'">Danh mục</title>
</head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title mb-4">
                        <i class="bi" th:classappend="${category.id != null ? 'bi-pencil' : 'bi-plus-circle'}"></i>
                        <span th:text="${category.id != null ? 'Sửa danh mục' : 'Thêm danh mục mới'}">Form</span>
                    </h3>

                    <form th:action="@{/admin/categories/save}" method="post">
                        <input type="hidden" name="id" th:value="${category.id}" th:if="${category.id != null}">

                        <div class="mb-4">
                            <label for="name" class="form-label">Tên danh mục <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name"
                                   th:value="${category.name}" placeholder="Nhập tên danh mục" required>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/categories}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i>
                                <span th:text="${category.id != null ? 'Cập nhật' : 'Thêm mới'}">Lưu</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
