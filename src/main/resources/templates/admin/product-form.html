<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${product.id != null ? 'Sửa sản phẩm' : 'Thêm sản phẩm'} + ' - MiniShop'">Sản phẩm - MiniShop</title>
</head>
<body>
<div layout:fragment="content">

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h3 class="card-title mb-4">
                        <i class="bi" th:classappend="${product.id != null ? 'bi-pencil' : 'bi-plus-circle'}"></i>
                        <span th:text="${product.id != null ? 'Sửa sản phẩm' : 'Thêm sản phẩm mới'}">Form</span>
                    </h3>

                    <form th:action="@{/admin/products/save}" method="post">
                        <!-- Hidden ID for edit mode -->
                        <input type="hidden" name="id" th:value="${product.id}" th:if="${product.id != null}">

                        <div class="mb-3">
                            <label for="name" class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="name" name="name"
                                   th:value="${product.name}" placeholder="Nhập tên sản phẩm" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="price" class="form-label">Giá (₫) <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="price" name="price"
                                       th:value="${product.price}" placeholder="0" min="0" step="1000" required>
                            </div>
                            <div class="col-md-6">
                                <label for="quantityInStock" class="form-label">Tồn kho <span class="text-danger">*</span></label>
                                <input type="number" class="form-control" id="quantityInStock" name="quantityInStock"
                                       th:value="${product.quantityInStock}" placeholder="0" min="0" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Danh mục <span class="text-danger">*</span></label>
                            <select class="form-select" id="categoryId" name="categoryId" required>
                                <option value="">-- Chọn danh mục --</option>
                                <option th:each="cat : ${categories}"
                                        th:value="${cat.id}"
                                        th:text="${cat.name}"
                                        th:selected="${product.category != null && product.category.id == cat.id}">
                                </option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="imageUrl" class="form-label">URL Ảnh</label>
                            <input type="text" class="form-control" id="imageUrl" name="imageUrl"
                                   th:value="${product.imageUrl}" placeholder="https://...">
                        </div>
                        <div class="d-flex justify-content-between">
                            <a th:href="@{/admin/products}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i>
                                <span th:text="${product.id != null ? 'Cập nhật' : 'Thêm mới'}">Lưu</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
