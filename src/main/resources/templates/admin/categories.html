<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Quản lý danh mục - MiniShop</title>
</head>
<body>
<div layout:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><i class="bi bi-tags"></i> Quản lý danh mục</h3>
        <a th:href="@{/admin/categories/create}" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Thêm danh mục
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="table-responsive">
                <table class="table table-hover bg-white shadow-sm" style="border-radius: 12px; overflow: hidden;">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Tên danh mục</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cat : ${categories}">
                            <td th:text="${cat.id}">1</td>
                            <td th:text="${cat.name}">Category</td>
                            <td class="text-center text-nowrap">
                                <a th:href="@{/admin/categories/edit/{id}(id=${cat.id})}"
                                   class="btn btn-outline-primary btn-sm me-1">
                                    <i class="bi bi-pencil"></i> Sửa
                                </a>
                                <form th:action="@{/admin/categories/delete/{id}(id=${cat.id})}" method="post" class="d-inline">
                                    <button type="submit" class="btn btn-outline-danger btn-sm"
                                            onclick="return confirm('Bạn có chắc muốn xóa danh mục này?')">
                                        <i class="bi bi-trash"></i> Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.size(categories) == 0}">
                            <td colspan="3" class="text-center text-muted py-4">Không có danh mục nào.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav th:if="${totalPages > 1}" aria-label="Page navigation" class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" th:classappend="${currentPage == 0 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/categories(page=${currentPage - 1})}">Trước</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${currentPage == i ? 'active' : ''}">
                        <a class="page-link" th:href="@{/admin/categories(page=${i})}" th:text="${i + 1}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1 ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/admin/categories(page=${currentPage + 1})}">Sau</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

</div>
</body>
</html>
